<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Helvetica', sans-serif; font-size: 12px; padding: 40px; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 4px; }
    .sub { text-align: center; color: #666; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    .att { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>{{ student.full_name }}</h1>
  <p class="sub">Attendance Rate: {{ attendance_rate }}%</p>
  <table>
    <tr><th>Subject</th>{% for t in terms %}<th>Term {{ t }}</th>{% endfor %}</tr>
    {% for row in report_data %}
    <tr>
      <td>{{ row.subject }}</td>
      {% for t in terms %}<td>{{ row[t] if row[t] != '-' else '-' }}</td>{% endfor %}
    </tr>
    {% endfor %}
  </table>
</body>
</html>
