{% extends "layouts/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white rounded-xl shadow p-8">
  <h1 class="text-2xl font-bold text-center mb-6">Sign In</h1>
  <form method="POST">
    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input type="email" name="email" required autofocus
      class="w-full border rounded-lg px-3 py-2 mb-4 text-sm">

    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
    <input type="password" name="password" required
      class="w-full border rounded-lg px-3 py-2 mb-6 text-sm">

    <button type="submit"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700">
      Login
    </button>
  </form>
</div>
{% endblock %}
