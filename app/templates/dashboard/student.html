{% extends "layouts/base.html" %}
{% block title %}My Dashboard{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">My Dashboard</h1>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
  <div class="bg-white rounded-xl shadow p-6 text-center">
    <div class="text-3xl font-bold text-indigo-600">{{ attendance_rate }}%</div>
    <div class="text-sm text-gray-500 mt-1">Attendance Rate</div>
  </div>
  <div class="bg-white rounded-xl shadow p-6 text-center">
    <div class="text-3xl font-bold text-indigo-600">{{ scores|length }}</div>
    <div class="text-sm text-gray-500 mt-1">Score Records</div>
  </div>
</div>
<a href="{{ url_for('reports.student_report', student_id=current_user.id) }}"
  class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">
  View Full Report
</a>
{% endblock %}
