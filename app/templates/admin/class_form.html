{% extends "layouts/base.html" %}
{% block title %}New Class{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">New Class</h1>
<div class="max-w-lg bg-white rounded-xl shadow p-6">
  <form method="POST">
    <label class="block text-sm font-medium mb-1">Class Name</label>
    <input type="text" name="name" placeholder="e.g. Grade 10A" required class="w-full border rounded-lg px-3 py-2 mb-4 text-sm">

    <label class="block text-sm font-medium mb-1">Academic Year</label>
    <input type="text" name="academic_year" placeholder="e.g. 2025/2026" required class="w-full border rounded-lg px-3 py-2 mb-4 text-sm">

    <label class="block text-sm font-medium mb-1">Teacher</label>
    <select name="teacher_id" class="w-full border rounded-lg px-3 py-2 mb-6 text-sm">
      <option value="">— Select —</option>
      {% for t in teachers %}
        <option value="{{ t.id }}">{{ t.full_name }}</option>
      {% endfor %}
    </select>

    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">Create</button>
  </form>
</div>
{% endblock %}
