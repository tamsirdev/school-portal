{% extends "layouts/base.html" %}
{% block title %}Manage Users{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">Users</h1>
  <a href="{{ url_for('admin.create_user') }}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">+ New User</a>
</div>
<div class="bg-white rounded-xl shadow overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-left">
      <tr><th class="px-4 py-3">Name</th><th class="px-4 py-3">Email</th><th class="px-4 py-3">Role</th></tr>
    </thead>
    <tbody>
      {% for user in users %}
      <tr class="border-t">
        <td class="px-4 py-3">{{ user.full_name }}</td>
        <td class="px-4 py-3 text-gray-500">{{ user.email }}</td>
        <td class="px-4 py-3">
          <span class="inline-block px-2 py-0.5 rounded text-xs font-semibold
            {% if user.is_admin() %}bg-purple-100 text-purple-800
            {% elif user.is_teacher() %}bg-blue-100 text-blue-800
            {% elif user.is_student() %}bg-green-100 text-green-800
            {% else %}bg-gray-100 text-gray-800{% endif %}">
            {{ user.role }}
          </span>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
