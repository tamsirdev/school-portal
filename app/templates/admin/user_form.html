{% extends "layouts/base.html" %}
{% block title %}New User{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">New User</h1>
<div class="max-w-lg bg-white rounded-xl shadow p-6">
  <form method="POST">
    <label class="block text-sm font-medium mb-1">Full Name</label>
    <input type="text" name="full_name" required class="w-full border rounded-lg px-3 py-2 mb-4 text-sm">

    <label class="block text-sm font-medium mb-1">Email</label>
    <input type="email" name="email" required class="w-full border rounded-lg px-3 py-2 mb-4 text-sm">

    <label class="block text-sm font-medium mb-1">Password</label>
    <input type="text" name="password" value="changeme123" class="w-full border rounded-lg px-3 py-2 mb-4 text-sm">

    <label class="block text-sm font-medium mb-1">Role</label>
    <select name="role" class="w-full border rounded-lg px-3 py-2 mb-6 text-sm">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
      <option value="admin">Admin</option>
      <option value="parent">Parent</option>
    </select>

    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">Create</button>
  </form>
</div>
{% endblock %}
